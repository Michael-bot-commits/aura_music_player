name: music_player
description: AURA — personal all-in-one media player (iOS-first, Flutter).
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.1
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.2.1
  palette_generator: ^0.3.3
  path_drawing: ^1.0.1
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  just_audio_background: ^0.0.1-beta.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/artwork/
